services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-appdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-appdb}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - chronicle-dev

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    # Kein Healthcheck hier: Erleichtert den Start und verhindert "eacces" Blockaden
    networks:
      - chronicle-dev

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    env_file:
      - .env.dev
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ASYNC_DATABASE_URL: ${ASYNC_DATABASE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      APP_ENV: development
    volumes:
      - ./services/backend:/app
      - /app/.venv # Verhindert, dass das lokale venv das Container-venv überschreibt
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chronicle-dev

  frontend:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .env.dev
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      CHOKIDAR_USEPOLLING: "true" # Wichtig für Hot-Reload in Docker
    ports:
      - "5173:5173"
    volumes:
      - ./services/frontend:/app
      - /app/node_modules # Schützt die node_modules im Container
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - chronicle-dev

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file:
      - .env.dev
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      DATABASE_URL: ${DATABASE_URL}
      APP_ENV: development
    depends_on:
      - rabbitmq
      - backend
    networks:
      - chronicle-dev

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4_dev
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-password}
    networks:
      - chronicle-dev

volumes:
  postgres_data_dev:

networks:
  chronicle-dev:
    driver: bridge