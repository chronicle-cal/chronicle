services:
    postgres:
        image: postgres:15
        environment:
            POSTGRES_USER: admin
            POSTGRES_PASSWORD: password
            POSTGRES_DB: appdb
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
            interval: 5s
            timeout: 3s
            retries: 20
        networks:
            - chronicle-internal

    backend:
        build:
            context: .
            dockerfile: services/backend/Dockerfile
        environment:
            DATABASE_URL: postgresql://admin:password@postgres:5432/appdb
            ASYNC_DATABASE_URL: postgresql+asyncpg://admin:password@postgres:5432/appdb
        command: >
            sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - chronicle-internal

    rabbitmq:
        image: rabbitmq:3-management
        ports:
            - "5672:5672"
            - "15672:15672"
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        networks:
            - chronicle-internal


    pgadmin:
        image: dpage/pgadmin4
        container_name: pgadmin4_container
        restart: always
        ports:
            - "8888:80"
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@example.com
            PGADMIN_DEFAULT_PASSWORD: password
        volumes:
           - pgadmin-data:/var/lib/pgadmin
        networks:
            - chronicle-internal

    frontend:
        build:
            context: .
            dockerfile: services/frontend/Dockerfile
        ports:
            - "5173:5173"
        depends_on:
            - backend
        volumes:
            - ./services/frontend:/app
            - frontend_node_modules:/app/node_modules
        command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
        networks:
            - chronicle-internal

    worker:
        build:
            context: .
            dockerfile: services/worker/Dockerfile
        depends_on:
            - rabbitmq
            - backend
        networks:
            - chronicle-internal

volumes:
    postgres_data: {}
    frontend_node_modules: {}
    pgadmin-data: {}

networks:
    chronicle-internal:
        driver: bridge
