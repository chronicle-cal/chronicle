services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d appdb"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - chronicle-internal

  rabbitmq:
    image: rabbitmq:3-management-alpine
    networks:
      - chronicle-internal

networks:
  chronicle-internal:
    driver: bridge

volumes:
  postgres_data: