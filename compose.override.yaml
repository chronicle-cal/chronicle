services:
  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./services/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chronicle-internal

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    ports:
      - "80:8080"
    networks:
      - chronicle-internal

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    depends_on:
      - rabbitmq
    networks:
      - chronicle-internal