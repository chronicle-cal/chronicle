name: CI

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Ruff (lint + format)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Ruff lint
        run: uvx ruff check .

      - name: Ruff format check
        run: uvx ruff format --check .

  backend-tests:
    name: Backend Pytest (with Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d appdb"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      DATABASE_URL: postgresql+asyncpg://admin:password@127.0.0.1:5432/appdb

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: |
            **/requirements*.txt
            **/pyproject.toml
            **/uv.lock

      - name: Create virtual environment
        run: |
          uv venv
          echo "${{ github.workspace }}/.venv/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: |
          uv pip install -r services/backend/requirements.txt
          uv pip install pytest pytest-cov

      - name: Run migrations
        working-directory: services/backend
        run: |
          alembic upgrade head

      - name: Run tests
        working-directory: services/backend
        run: |
          if find . -maxdepth 4 -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -q --cov --cov-report=term-missing
          else
            echo "No tests found; skipping."
          fi

  auth-smoke:
    name: Auth smoke test (register/login/me/update/delete)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint]

    steps:
      - uses: actions/checkout@v4

      - name: Build images
        run: docker compose -f compose.yaml build

      - name: Start backend stack
        run: docker compose -f compose.yaml up -d postgres backend

      - name: Wait for backend health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/api/health >/dev/null; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          echo "Backend did not become healthy in time."
          docker compose -f compose.yaml logs --no-color postgres backend
          exit 1

      - name: Auth flow
        env:
          EMAIL: smoke+${{ github.run_id }}@example.com
          PASSWORD: Passw0rd123!
        run: |
          set -euo pipefail
          register_resp=$(curl -fsS -X POST http://127.0.0.1:8000/api/auth/register \
            -H "Content-Type: application/json" \
            -d "{\"email\":\"$EMAIL\",\"password\":\"$PASSWORD\"}")
          token=$(python3 - <<'PY'
import json,sys
data=json.loads(sys.stdin.read())
print(data["access_token"])
PY
<<<"$register_resp")

          me_resp=$(curl -fsS http://127.0.0.1:8000/api/auth/me \
            -H "Authorization: Bearer $token")
          python3 - <<'PY'
import json,sys
data=json.loads(sys.stdin.read())
assert data.get("authenticated") is True, data
assert data.get("email"), data
PY
<<<"$me_resp"

          curl -fsS -X POST http://127.0.0.1:8000/api/auth/update-name \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $token" \
            -d "{\"name\":\"Smoke User\",\"password\":\"$PASSWORD\"}" >/dev/null

          update_email_resp=$(curl -fsS -X POST http://127.0.0.1:8000/api/auth/update-email \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $token" \
            -d "{\"new_email\":\"smoke-updated+${{ github.run_id }}@example.com\",\"password\":\"$PASSWORD\"}")
          token=$(python3 - <<'PY'
import json,sys
data=json.loads(sys.stdin.read())
print(data["access_token"])
PY
<<<"$update_email_resp")

          curl -fsS -X POST http://127.0.0.1:8000/api/auth/update-password \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $token" \
            -d "{\"current_password\":\"$PASSWORD\",\"new_password\":\"Passw0rd456!\"}" >/dev/null

          curl -fsS -X POST http://127.0.0.1:8000/api/auth/delete-account \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $token" \
            -d "{\"confirm\":\"delete\"}" >/dev/null

      - name: Shutdown
        if: always()
        run: docker compose -f compose.yaml down -v
