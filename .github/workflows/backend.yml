name: Backend CI
on:
  push:
    branches: [main]
    paths:
      - 'services/backend/**'
  pull_request:
    branches: [main]
    paths:
      - 'services/backend/**'
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
defaults:
  run:
    shell: bash
env:
  PYTHON_VERSION: "3.12"
jobs:
  test:
    name: Backend Pytest (with Database)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
          POSTGRES_DB: appdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin -d appdb" --health-interval=5s --health-timeout=3s --health-retries=20
    env:
      ASYNC_DATABASE_URL: postgresql+asyncpg://admin:password@127.0.0.1:5432/appdb
      DATABASE_URL: postgresql://admin:password@127.0.0.1:5432/appdb
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v2
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: services/backend
        run: uv sync
      - name: Run database migrations
        working-directory: services/backend
        run: uv run alembic upgrade head
      - name: Run tests with pytest
        working-directory: services/backend
        run: uv run pytest
